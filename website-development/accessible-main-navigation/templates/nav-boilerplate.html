<!-- Accessible Navigation Boilerplate -->

<!-- 1. Skip Link (Must be first in body) -->
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- 2. Header Landmark -->
<header role="banner">
  <!-- Brand/Logo -->
  <a href="/" class="logo" aria-label="Go to homepage"> Company Name </a>

  <!-- 3. Mobile Menu Toggle -->
  <!-- Ensure it is a <button> for screen readers -->
  <button
    class="nav-toggle"
    aria-expanded="false"
    aria-controls="primary-navigation"
    aria-label="Toggle navigation menu"
  >
    <span class="hamburger-icon" aria-hidden="true"></span>
  </button>

  <!-- 4. Navigation Landmark -->
  <nav id="primary-navigation" aria-label="Main">
    <ul class="nav-list">
      <li><a href="/">Home</a></li>
      <li>
        <!-- Dropdown Example -->
        <button
          aria-haspopup="true"
          aria-expanded="false"
          class="dropdown-trigger"
        >
          Services
        </button>
        <ul class="dropdown-menu">
          <li><a href="/service-1">Service 1</a></li>
          <li><a href="/service-2">Service 2</a></li>
        </ul>
      </li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- 5. Main Content Target -->
<main id="main-content" tabindex="-1">
  <!-- Content goes here -->
</main>

<style>
  /* CSS Requirements for Accessibility */

  /* Visually hide skip link unless focused */
  .skip-link {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .skip-link:focus {
    position: static;
    width: auto;
    height: auto;
    clip: auto;
    /* Add focus styles here */
  }

  /* Ensure focus indicators are never removed */
  *:focus-visible {
    outline: 3px solid #005a9c;
    outline-offset: 2px;
  }

  /* Tabindex -1 on main removes it from tab order but allows programmatic focus */
  main:focus {
    outline: none;
  }
</style>
