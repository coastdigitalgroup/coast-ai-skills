<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessible Responsive Header Example</title>
    <style>
      /* Skip Link */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #000;
        color: white;
        padding: 8px;
        z-index: 100;
        transition: top 0.2s;
      }
      .skip-link:focus {
        top: 0;
      }

      /* Basic Layout */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        background: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
      }

      .logo {
        font-weight: bold;
        font-size: 1.5rem;
        text-decoration: none;
        color: #333;
      }

      /* Navigation Desktop */
      nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 1.5rem;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-weight: 500;
      }
      nav a:hover,
      nav a:focus {
        color: #007bff;
        outline: 2px solid #007bff;
        outline-offset: 4px;
      }

      /* Mobile Toggle */
      .menu-toggle {
        display: none;
        background: none;
        border: 1px solid #333;
        padding: 0.5rem;
        cursor: pointer;
      }

      /* Mobile Styles */
      @media (max-width: 768px) {
        .menu-toggle {
          display: block;
        }

        nav ul {
          display: none; /* Hidden by default on mobile */
          flex-direction: column;
          position: absolute;
          top: 70px;
          left: 0;
          right: 0;
          background: white;
          padding: 1rem;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        nav ul[data-visible='true'] {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
      <a href="/" class="logo">Brand</a>

      <button
        class="menu-toggle"
        aria-expanded="false"
        aria-controls="main-nav-list"
        aria-label="Menu"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <nav aria-label="Main">
        <ul id="main-nav-list">
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/services">Services</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content" tabindex="-1">
      <h1>Welcome to our site</h1>
      <p>This is an example of an accessible main navigation system.</p>
    </main>

    <script>
      const toggle = document.querySelector('.menu-toggle')
      const navList = document.querySelector('#main-nav-list')

      toggle.addEventListener('click', () => {
        const isExpanded = toggle.getAttribute('aria-expanded') === 'true'
        toggle.setAttribute('aria-expanded', !isExpanded)
        navList.setAttribute('data-visible', !isExpanded)
      })

      // Close on Escape key
      window.addEventListener('keydown', (e) => {
        if (
          e.key === 'Escape' &&
          toggle.getAttribute('aria-expanded') === 'true'
        ) {
          toggle.setAttribute('aria-expanded', 'false')
          navList.setAttribute('data-visible', 'false')
          toggle.focus()
        }
      })
    </script>
  </body>
</html>
